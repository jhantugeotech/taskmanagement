version: "3.7"

services:
  app:
    build: .
    expose:
      - "9097"
    ports:
      - "9097:9097"
    depends_on:
      - db

  db:
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pritam@123
      POSTGRES_DB: taskmanagement
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: